<script>
let deferredPrompt;
const btnInstall = document.getElementById("btnInstall");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = "block"; // mostra o botão
});

btnInstall.addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log("Resultado da instalação:", outcome);
    deferredPrompt = null;
    btnInstall.style.display = "none";
  }
});

// Registrar o Service Worker

  navigator.serviceWorker.register("sw.js");

</script>
<script>
/* ===================================================
   🔐 SISTEMA DE PROTEÇÃO PWA - NÍVEL MÁXIMO FRONT-END
   =================================================== */

/* =========================
   1️⃣ CONTROLE DE INSTALAÇÃO
========================= */

let deferredPrompt;
const btnInstall = document.getElementById("btnInstall");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = "block";
});

btnInstall.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;

  if (choice.outcome === "accepted") {
    console.log("App instalado");
  } else {
    console.log("Instalação recusada");
  }

  deferredPrompt = null;
  btnInstall.style.display = "none";
});

/* =========================
   2️⃣ DETECTA SE É PWA INSTALADO
========================= */

function isRunningStandalone() {
  return window.matchMedia("(display-mode: standalone)").matches ||
         window.navigator.standalone === true;
}

/* =========================
   3️⃣ BLOQUEIO SE NÃO INSTALADO
========================= */

document.addEventListener("DOMContentLoaded", () => {

 if (!isRunningStandalone()) {
  console.log("Abra pelo app instalado para liberar tudo");
}

  protegerLinks();
});

/* =========================
   4️⃣ CRIPTOGRAFIA DOS LINKS
========================= */

function protegerLinks() {

  const links = document.querySelectorAll(".channel-button");

  links.forEach(link => {

    // Salva URL original codificada
    const originalUrl = link.getAttribute("href");
    const encoded = btoa(originalUrl);

    // Remove href real
    link.removeAttribute("href");

    link.addEventListener("click", function(e) {
      e.preventDefault();

      // Pequena validação extra
      if (!isRunningStandalone()) {
        alert("Acesso permitido apenas pelo App instalado.");
        return;
      }

      const decoded = atob(encoded);
      window.open(decoded, "_blank");
    });

  });

}

/* =========================
   5️⃣ DETECÇÃO DE DEVTOOLS
========================= */

let devtoolsAberto = false;

setInterval(() => {

  const largura = window.outerWidth - window.innerWidth > 160;
  const altura  = window.outerHeight - window.innerHeight > 160;

  if (largura || altura) {
    if (!devtoolsAberto) {
      devtoolsAberto = true;
      bloquearAcesso();
    }
  }

}, 1000);

function bloquearAcesso() {
  document.body.innerHTML = `
    <div style="text-align:center;padding:40px">
      <h1>🚫 Acesso bloqueado</h1>
      <p>Ferramentas de desenvolvedor detectadas.</p>
    </div>
  `;
}

/* =========================
   6️⃣ BLOQUEIO DE AÇÕES COMUNS
========================= */

// Bloqueia botão direito
document.addEventListener("contextmenu", e => e.preventDefault());

// Bloqueia atalhos comuns
document.addEventListener("keydown", function(e) {
  if (
    e.key === "F12" ||
    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) ||
    (e.ctrlKey && e.key === "U")
  ) {
    e.preventDefault();
    bloquearAcesso();
  }
});

/* =========================
   7️⃣ REGISTRO DO SERVICE WORKER
========================= */

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker registrado"))
    .catch(() => console.log("Erro ao registrar SW"));
}

</script>
